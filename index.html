<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OUTROOT | מגדיר צמחים</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--green:#2D6A1F;--gl:#4A8C32;--gp:#E8F2E3;--cream:#F5F2EC;--white:#FAFAF7;--text:#1A1A1A;--tm:#4A5C40;--border:#D8E8CC;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Heebo',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
.hero{background:var(--green);padding:36px 24px 52px;text-align:center;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#fff,transparent);opacity:0.3;}
.logo-wrap{margin-bottom:20px;}
.logo-wrap img{height:90px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.25));}
.hero-tag{font-size:12px;letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.7);margin-bottom:20px;}
.hero h1{font-size:clamp(22px,4vw,34px);font-weight:800;color:#fff;line-height:1.25;margin-bottom:10px;}
.hero h1 span{color:#a8d88a;}
.hero p{color:rgba(255,255,255,0.75);font-size:14px;max-width:420px;margin:0 auto 24px;line-height:1.65;}
.badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;}
.badge{background:rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.9);padding:5px 14px;border-radius:20px;font-size:11px;}
.search-outer{max-width:680px;margin:-26px auto 0;padding:0 16px;position:relative;z-index:20;}
.search-box{display:flex;background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,0.15);overflow:hidden;border:2px solid transparent;transition:border-color 0.2s;}
.search-box:focus-within{border-color:var(--green);}
.si{padding:0 14px;color:var(--green);font-size:18px;display:flex;align-items:center;}
#searchInput{flex:1;border:none;outline:none;padding:17px 0;font-family:'Heebo',sans-serif;font-size:15px;color:var(--text);background:transparent;direction:rtl;}
#searchInput::placeholder{color:#aaa;}
.sbtn{background:var(--green);color:#fff;border:none;padding:0 22px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.sbtn:hover{background:var(--gl);}
#aiPanel{max-width:680px;margin:10px auto 0;padding:0 16px;display:none;}
.ai-box{background:#111;border-radius:12px;padding:18px 22px;border:1px solid rgba(74,140,50,0.3);}
.ai-bar{display:flex;align-items:center;gap:8px;font-size:11px;color:#666;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.ai-dot{width:7px;height:7px;background:var(--gl);border-radius:50%;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.ai-answer{font-size:14px;color:#ddd;line-height:1.6;margin-bottom:12px;}
.ai-chips{display:flex;flex-wrap:wrap;gap:7px;}
.chip{background:rgba(74,140,50,0.15);border:1px solid rgba(74,140,50,0.35);color:#aad08a;padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;}
.chip:hover{background:rgba(74,140,50,0.3);color:#fff;}
.ai-tip{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:#777;}
.thinking{display:flex;gap:5px;align-items:center;color:#666;font-size:13px;}
.thinking span{width:5px;height:5px;background:var(--gl);border-radius:50%;animation:bounce 1.1s infinite;}
.thinking span:nth-child(2){animation-delay:0.18s}.thinking span:nth-child(3){animation-delay:0.36s}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.cam-wrap{max-width:680px;margin:10px auto 0;padding:0 16px;}
.cam-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(0,0,0,0.05);border:1.5px dashed #bbb;color:var(--tm);padding:10px 20px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;width:100%;}
.cam-btn:hover{border-color:var(--green);color:var(--green);background:var(--gp);}
#camResult{max-width:680px;margin:10px auto 0;padding:0 16px;display:none;}
.cam-card{background:#fff;border-radius:12px;padding:18px 20px;border:1.5px solid var(--border);display:flex;gap:16px;align-items:flex-start;}
.cam-img{width:80px;height:80px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.cam-info h3{font-size:16px;font-weight:700;color:var(--green);margin-bottom:6px;}
.cam-info p{font-size:13px;color:var(--tm);line-height:1.5;}
.fzone{max-width:880px;margin:28px auto 0;padding:0 16px;}
.flabel{font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:#999;margin-bottom:10px;}
.crow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.drow{display:flex;flex-wrap:wrap;gap:6px;}
.cbtn{background:#fff;border:1.5px solid var(--border);color:var(--tm);padding:7px 16px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.18s;}
.cbtn:hover{border-color:var(--green);}
.cbtn.active{background:#111;border-color:#111;color:#fff;}
.dbtn{background:var(--cream);border:1.5px solid #ddd;color:#666;padding:5px 12px;border-radius:6px;font-family:'Heebo',sans-serif;font-size:12px;cursor:pointer;transition:all 0.18s;}
.dbtn:hover{border-color:var(--green);color:var(--green);}
.dbtn.active{background:var(--green);border-color:var(--green);color:#fff;}
.rzone{max-width:880px;margin:20px auto 80px;padding:0 16px;}
.rmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;font-size:13px;color:#888;}
.rmeta strong{color:#111;font-weight:700;}
.catsec{margin-bottom:28px;}
.cattop{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--gp);}
.catem{font-size:20px;}.catnm{font-size:18px;font-weight:800;color:#111;}.catct{margin-right:auto;background:var(--gp);color:var(--green);padding:2px 10px;border-radius:8px;font-size:11px;font-weight:700;}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.pcard{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:0 0 14px 0;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.pcard:hover{border-color:var(--green);box-shadow:0 4px 18px rgba(45,106,31,0.1);transform:translateY(-1px);}
.pcard.sel{background:var(--gp);border-color:var(--green);}
.chk{position:absolute;top:8px;left:8px;z-index:2;width:22px;height:22px;border-radius:50%;border:2px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent;transition:all 0.18s;}
.pcard.sel .chk{background:var(--green);border-color:var(--green);color:#fff;}
.pimg-wrap{position:relative;width:100%;height:150px;overflow:hidden;cursor:zoom-in;background:#f0f0f0;}
.pimg{width:100%;height:100%;object-fit:cover;transition:transform 0.3s;display:block;}
.pimg-wrap:hover .pimg{transform:scale(1.05);}
.zoom{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,0.5);color:#fff;font-size:11px;padding:2px 7px;border-radius:10px;opacity:0;transition:opacity 0.2s;}
.pimg-wrap:hover .zoom{opacity:1;}
.pname{font-size:15px;font-weight:700;color:#111;margin:10px 14px 6px;}
.pdesc{font-size:12px;color:#666;line-height:1.5;margin:0 14px 10px;}
.ptags{display:flex;flex-wrap:wrap;gap:4px;margin:0 14px;}
.tag{font-size:10px;padding:2px 8px;border-radius:6px;font-weight:600;}
.ts{background:#fff8e1;color:#b07800;}.tsh{background:#e8f5e9;color:#2e7d32;}
.twl{background:#fff3e0;color:#bf360c;}.twm{background:#e3f2fd;color:#1565c0;}.twh{background:#e1f5fe;color:#0277bd;}
.tev{background:#e8f5e9;color:#1b5e20;}.tde{background:#fce4ec;color:#880e4f;}.tsea{background:#f3e5f5;color:#6a1b9a;}
#bar{position:fixed;bottom:0;left:0;right:0;background:var(--green);padding:12px 20px;z-index:100;display:none;align-items:center;justify-content:space-between;gap:12px;border-top:1px solid rgba(0,0,0,0.1);}
#bar.show{display:flex;}
.bl{color:#fff;font-size:14px;}.bl strong{color:#a8d88a;}
.bbts{display:flex;gap:8px;}
.bcl{background:transparent;color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.3);padding:9px 14px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:13px;cursor:pointer;}
.bsd{background:#fff;color:var(--green);border:none;padding:9px 20px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
.mbox{background:var(--white);border-radius:18px;padding:30px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;position:relative;}
.mclose{position:absolute;top:16px;left:16px;background:#eee;border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:#666;display:flex;align-items:center;justify-content:center;}
.mlogo{display:flex;justify-content:center;margin-bottom:16px;}.mlogo img{height:48px;}
.mbox h2{font-size:20px;font-weight:800;color:#111;text-align:center;margin-bottom:16px;}
.slist{list-style:none;margin-bottom:16px;}
.slist li{padding:9px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;display:flex;align-items:center;gap:8px;}
.dot{width:7px;height:7px;background:var(--green);border-radius:50%;flex-shrink:0;}
.carea{background:var(--cream);border-radius:10px;padding:14px;font-size:12px;line-height:1.7;color:#555;white-space:pre-wrap;font-family:'Heebo',sans-serif;direction:rtl;margin-bottom:12px;border:1px solid var(--border);}
.cpybtn{width:100%;background:var(--green);color:#fff;border:none;padding:14px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;}
.visbtn{width:100%;background:#111;color:#fff;border:none;padding:12px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
#visResult{font-size:13px;color:#555;line-height:1.65;display:none;margin-top:10px;}
#lb{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px;}
#lb.open{display:flex;}
#lb img{max-width:90vw;max-height:75vh;border-radius:12px;object-fit:contain;}
#lbname{color:#fff;font-size:18px;font-weight:700;}
.lbclose{position:absolute;top:16px;left:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.empty{text-align:center;padding:60px 20px;color:#aaa;}
@media(max-width:600px){.pgrid{grid-template-columns:1fr;}#bar{flex-direction:column;gap:8px;}.bbts{width:100%;}.bcl,.bsd{flex:1;text-align:center;}}
</style>
</head>

const CATS = {"עצים":"🌳","גדר חיה":"🌿","שיחי נוי":"🌸","פרחים":"🌺","משתרעים":"🍃","מטפסים":"🪴","טרופי":"🌴","דגניים":"🌾","צמחי תועלת":"🫚"};
let aCat="הכל", aConds=[], sel=new Set();

function buildFilters(){
  const cr=document.getElementById("crow");
  const mk=(lbl,val)=>{
    const b=document.createElement("button");
    b.className="cbtn"+(val==="הכל"?" active":"");
    b.textContent=lbl;
    b.onclick=()=>{aCat=val;cr.querySelectorAll(".cbtn").forEach(x=>x.classList.remove("active"));b.classList.add("active");render();};
    cr.appendChild(b);
  };
  mk("🌿 הכל","הכל");
  Object.entries(CATS).forEach(([c,e])=>mk(e+" "+c,c));
  const conds=[
    {l:"☀️ שמש מלאה",fn:p=>p.sun.includes("שמש מלאה")},
    {l:"🌤 חצי צל",fn:p=>p.sun.includes("חצי צל")},
    {l:"🌑 צל",fn:p=>p.sun.includes("צל")},
    {l:"💧 חסכן במים",fn:p=>p.water.includes("נמוכה")},
    {l:"🌲 ירוק-עד",fn:p=>p.ever==="ירוק-עד"},
    {l:"🌸 פורח",fn:p=>p.desc.includes("פריח")||p.desc.includes("פרח")},
    {l:"🌬️ ריחני",fn:p=>p.desc.includes("ריח")},
  ];
  const dr=document.getElementById("drow");
  conds.forEach(c=>{
    const b=document.createElement("button");
    b.className="dbtn";b.textContent=c.l;
    b.onclick=()=>{const i=aConds.findIndex(x=>x.l===c.l);if(i>=0){aConds.splice(i,1);b.classList.remove("active");}else{aConds.push(c);b.classList.add("active");}render();};
    dr.appendChild(b);
  });
}

function getFilt(q=""){
  let p=[...PLANTS];
  if(aCat!=="הכל") p=p.filter(x=>x.cat===aCat);
  aConds.forEach(c=>p=p.filter(c.fn));
  if(q.trim()){const lq=q.toLowerCase();p=p.filter(x=>x.name.toLowerCase().includes(lq)||x.desc.toLowerCase().includes(lq)||x.cat.toLowerCase().includes(lq)||x.season.toLowerCase().includes(lq));}
  return p;
}

function render(q=""){
  const plants=getFilt(q);
  document.getElementById("cnt").textContent=plants.length;
  const area=document.getElementById("results");
  if(!plants.length){area.innerHTML='<div class="empty"><div style="font-size:40px">🔍</div><p>לא נמצאו צמחים — נסו לשנות את הסינון.</p></div>';return;}
  const grps={};
  plants.forEach(p=>{if(!grps[p.cat])grps[p.cat]=[];grps[p.cat].push(p);});
  area.innerHTML="";
  Object.entries(grps).forEach(([cat,ps])=>{
    const sec=document.createElement("div");sec.className="catsec";
    sec.innerHTML=`<div class="cattop"><span class="catem">${CATS[cat]||"🌿"}</span><span class="catnm">${cat}</span><span class="catct">${ps.length}</span></div><div class="pgrid" id="g-${cat}"></div>`;
    area.appendChild(sec);
    const grid=sec.querySelector(".pgrid");
    ps.forEach(p=>{
      const wc=p.water.includes("נמוכה")?"twl":p.water.includes("גבוהה")?"twh":"twm";
      const sc2=p.sun.includes("מלאה")?"ts":"tsh";
      const ec=p.ever==="ירוק-עד"?"tev":"tde";
      const d=document.createElement("div");
      d.className="pcard"+(sel.has(p.id)?" sel":"");
      d.innerHTML=`<div class="chk">✓</div>
        <div class="pimg-wrap" onclick="event.stopPropagation();openLb('${p.img}','${p.name}')">
          <img src="${p.img}" class="pimg" alt="${p.name}" loading="lazy" onerror="this.closest('.pimg-wrap').style.display='none'">
          <div class="zoom">🔍</div>
        </div>
        <div class="pname">${p.name}</div>
        <div class="pdesc">${p.desc}</div>
        <div class="ptags"><span class="tag ${sc2}">${p.sun}</span><span class="tag ${wc}">💧${p.water}</span><span class="tag ${ec}">${p.ever}</span>${p.season!=="כל השנה"?`<span class="tag tsea">🌸${p.season}</span>`:""}</div>`;
      d.onclick=()=>{sel.has(p.id)?sel.delete(p.id):sel.add(p.id);d.classList.toggle("sel");updBar();};
      grid.appendChild(d);
    });
  });
}

function updBar(){document.getElementById("sc").textContent=sel.size;document.getElementById("bar").classList.toggle("show",sel.size>0);}
function clearAll(){sel.clear();document.querySelectorAll(".pcard").forEach(c=>c.classList.remove("sel"));updBar();}

function openModal(){
  const plants=PLANTS.filter(p=>sel.has(p.id));
  document.getElementById("slist").innerHTML=plants.map(p=>`<li><span class="dot"></span><strong>${p.name}</strong> — ${p.desc.substring(0,55)}...</li>`).join("");
  const grps={};plants.forEach(p=>{if(!grps[p.cat])grps[p.cat]=[];grps[p.cat].push(p.name);});
  let txt="🌱 שלום OUTROOT!\n\nבחרתי את הצמחים הבאים:\n\n";
  Object.entries(grps).forEach(([c,ns])=>{txt+=`${CATS[c]||"🌿"} ${c}:\n`;ns.forEach(n=>txt+=`  • ${n}\n`);txt+="\n";});
  txt+=`סה"כ: ${plants.length} צמחים.\nמחכה לפגישה! 🌿 We dig it.`;
  document.getElementById("carea").textContent=txt;
  document.getElementById("visResult").style.display="none";
  document.getElementById("modal").classList.add("open");
}
function closeModal(){document.getElementById("modal").classList.remove("open");}

function sendWA(){
  const txt=document.getElementById("carea").textContent;
  window.open("https://wa.me/972546132402?text="+encodeURIComponent(txt),"_blank");
}

function openLb(src,name){document.getElementById("lbimg").src=src;document.getElementById("lbname").textContent=name;document.getElementById("lb").classList.add("open");}
function closeLb(){document.getElementById("lb").classList.remove("open");}
document.getElementById("lb").addEventListener("click",e=>{if(e.target===document.getElementById("lb"))closeLb();});
document.getElementById("modal").addEventListener("click",e=>{if(e.target===document.getElementById("modal"))closeModal();});

async function doAI(){
  const q=document.getElementById("searchInput").value.trim();if(!q)return;
  const p=document.getElementById("aiPanel");p.style.display="block";
  p.innerHTML='<div class="ai-box"><div class="ai-bar"><div class="ai-dot"></div>OUTROOT AI</div><div class="thinking"><span></span><span></span><span></span></div></div>';
  const pl=PLANTS.map(x=>`${x.id}. ${x.name} (${x.cat}) — ${x.desc} | ${x.sun} | ${x.water}`).join("\n");
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:`אתה גנן מקצועי של OUTROOT. לקוח אומר: "${q}"\n\nצמחים:\n${pl}\n\nJSON בלבד: {"answer":"משפט אחד","plant_ids":[ids],"tip":"טיפ קצר"}`}]})});
    const d=await r.json();
    const obj=JSON.parse(d.content[0].text.replace(/```json|```/g,"").trim());
    const matched=PLANTS.filter(x=>obj.plant_ids.includes(x.id));
    p.innerHTML=`<div class="ai-box"><div class="ai-bar"><div class="ai-dot"></div>OUTROOT AI</div><div class="ai-answer">${obj.answer}</div><div class="ai-chips">${matched.map(x=>`<span class="chip" onclick="highlight(${x.id})">${x.name}</span>`).join("")}</div>${obj.tip?`<div class="ai-tip">💡 ${obj.tip}</div>`:""}</div>`;
    render(q);
  }catch(e){
    const fb=getFilt(q).slice(0,8);
    p.innerHTML=`<div class="ai-box"><div class="ai-bar"><div class="ai-dot"></div>חיפוש</div><div class="ai-chips">${fb.map(x=>`<span class="chip">${x.name}</span>`).join("")}</div></div>`;
    render(q);
  }
}

function highlight(id){render();setTimeout(()=>{document.querySelectorAll(".pcard").forEach(c=>{if(c.querySelector(".pname")?.textContent===PLANTS.find(p=>p.id===id)?.name)c.scrollIntoView({behavior:"smooth",block:"center"});});},300);}

async function identifyPlant(input){
  if(!input.files[0])return;
  const file=input.files[0];
  const reader=new FileReader();
  reader.onload=async(e)=>{
    const b64=e.target.result.split(",")[1];
    const imgUrl=e.target.result;
    const res=document.getElementById("camResult");res.style.display="block";
    res.innerHTML=`<div class="cam-card"><img src="${imgUrl}" class="cam-img"><div class="cam-info"><div class="thinking"><span></span><span></span><span></span> מזהה צמח...</div></div></div>`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:file.type,data:b64}},{type:"text",text:"מהו הצמח בתמונה? JSON בלבד: {name:שם עברי, tip:טיפ קצר}"}]}]})});
      const d=await r.json();
      const obj=JSON.parse(d.content[0].text.replace(/```json|```/g,"").trim());
      const match=PLANTS.find(p=>p.name.includes(obj.name.split(" ")[0])||obj.name.includes(p.name.split(" ")[0]));
      res.innerHTML=`<div class="cam-card"><img src="${imgUrl}" class="cam-img"><div class="cam-info"><h3>🌿 ${obj.name}</h3><p>${obj.tip}</p>${match?`<p style="margin-top:8px;color:var(--green);font-size:12px;font-weight:700;cursor:pointer" onclick="sel.add(${match.id});render();updBar();document.getElementById('camResult').style.display='none'">✓ קיים במגדיר — לחצו לסימון</p>`:""}</div></div>`;
    }catch(err){res.innerHTML=`<div class="cam-card"><div class="cam-info"><p>לא הצלחתי לזהות את הצמח. נסו שוב.</p></div></div>`;}
  };
  reader.readAsDataURL(file);
}

async function genVision(){
  const plants=PLANTS.filter(p=>sel.has(p.id));
  const vr=document.getElementById("visResult");vr.style.display="block";
  vr.innerHTML='<div class="thinking"><span></span><span></span><span></span> בונה ויזן לגינה שלכם...</div>';
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,messages:[{role:"user",content:`אתה גנן מומחה של OUTROOT. הלקוח בחר: ${plants.map(p=>p.name).join(", ")}. כתוב תיאור ויזואלי קצר ומרגש (4 משפטים) של איך הגינה תיראה. בסוף: "📞 OUTROOT — We dig it." בעברית בלבד.`}]})});
    const d=await r.json();
    vr.innerHTML=`<div style="padding:14px;background:var(--gp);border-radius:10px;font-size:13px;line-height:1.7;color:var(--tm)">${d.content[0].text.replace(/\n/g,"<br>")}</div>`;
  }catch{vr.innerHTML='<p style="color:#aaa;font-size:12px">לא הצלחתי ליצור ויזן כרגע.</p>';}
}

let aiT;
document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")doAI();});
document.getElementById("searchInput").addEventListener("input",e=>{clearTimeout(aiT);const q=e.target.value.trim();if(!q){document.getElementById("aiPanel").style.display="none";render();return;}aiT=setTimeout(()=>render(q),200);});

buildFilters();
render();
</script>
